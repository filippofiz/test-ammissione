<script type="module">

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// Questa funzione può essere chiamata dopo aver recuperato i dati dell'utente
window.updateHeaderGreeting = function(userName) {
  const userNameElement = document.querySelector('.user-name');
  if (userNameElement) {
    userNameElement.textContent = userName;
  }
}

// Gestione logout con Supabase
document.getElementById('logoutBtn')?.addEventListener('click', async () => {
  console.log('Logout clicked');
  
  // Esegui logout da Supabase
  const { error } = await supabase.auth.signOut();
  
  if (error) {
    console.error('Errore durante il logout:', error);
  } else {
    // Pulisci tutti i dati salvati
    sessionStorage.clear();
    localStorage.clear();
    
    // Redirect alla pagina di login
    window.location.href = '/login.html';
  }
});
</script>
