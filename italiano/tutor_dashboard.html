<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Tutor - Up to Ten</title>
  <link rel="stylesheet" href="header.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      color: rgb(28, 37, 69);
      position: relative;
      overflow-x: hidden;
    }

    /* Canvas per animated background */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.6;
    }

    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
      position: relative;
      z-index: 1;
    }

    /* Responsive container per schermi grandi */
    @media (min-width: 1600px) {
      .container {
        max-width: 1400px;
      }
    }

    @media (max-width: 1280px) {
      .container {
        padding: 0 1.5rem;
      }
    }

    @media (max-width: 768px) {
      .container {
        margin: 1rem auto;
        padding: 0 1rem;
      }
    }

    .dashboard-header {
      background: linear-gradient(135deg, rgb(28, 37, 69), #1a2541);
      color: white;
      padding: 2rem 2.5rem;
      border-radius: 16px;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.16);
      position: relative;
      z-index: 2;
    }

    .dashboard-header h2 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .modify-btn {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .modify-btn:hover {
      background: #00a666;
      border-color: #00a666;
      transform: translateY(-3px);
    }

    .students-section {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      position: relative;
      z-index: 2;
    }

    #studentsContainer {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    @media (max-width: 768px) {
      #studentsContainer {
        grid-template-columns: 1fr;
      }
    }

    /* Header della sezione studenti con toggle */
    .students-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .students-section h3 {
      font-size: 1.4rem;
      color: rgb(28, 37, 69);
      margin: 0;
    }

    /* Toggle switch container */
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .toggle-label {
      font-size: 0.9rem;
      color: #6c757d;
      font-weight: 500;
    }

    /* Toggle switch stile iOS */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 28px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #00a666;
    }

    input:checked + .slider:before {
      transform: translateX(22px);
    }

    .student-progress {
      background: white;
      border: 2px solid #e9ecef;
      border-radius: 16px;
      padding: 1.25rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .student-progress::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #00a666, #00c775);
    }

    .student-progress:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      border-color: #00a666;
    }

    .student-progress h3 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.5rem;
      color: rgb(28, 37, 69);
      flex-wrap: wrap;
    }

    .tutor-badge {
      font-size: 0.75rem;
      background: #00a666;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-weight: 600;
    }

    /* Tests container with cards */
    .tests-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      flex: 1;
    }

    .test-card {
      width: 100%;
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      padding: 1rem;
      transition: all 0.3s ease;
    }

    .test-card:hover {
      border-color: #00a666;
      background: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 166, 102, 0.15);
    }

    .test-card-header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: rgb(28, 37, 69);
    }

    .test-card-buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-start;
      flex-wrap: wrap;
    }

    .viewTestsBtn, .dashboardBtn {
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s ease;
      flex: 1;
      min-width: 120px;
    }

    .viewTestsBtn {
      background: white;
      color: #00a666;
      border: 2px solid #00a666;
    }

    .viewTestsBtn:hover {
      background: #00a666;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 166, 102, 0.3);
    }

    .dashboardBtn {
      background: rgb(28, 37, 69);
      color: white;
    }

    .dashboardBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(28, 37, 69, 0.3);
    }

    .no-tests-message {
      text-align: center;
      padding: 2rem;
      color: #6c757d;
      font-style: italic;
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 2rem;
      color: #6c757d;
    }

    .loading::after {
      content: "...";
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ""; }
      40% { content: "."; }
      60% { content: ".."; }
      80%, 100% { content: "..."; }
    }
  </style>
</head>
<body>
  <!-- Carica l'header dal file esterno -->
  <div id="header-placeholder"></div>

  <div class="container">
    <div class="dashboard-header">
      <h2>Dashboard Tutor</h2>
<div class="button-group">
  <button id="modifyTestsBtn" class="modify-btn">🛠️ Gestione test</button>
  <button id="assignTestsBtn" class="modify-btn">➕ Assegna nuovi test</button>
  <a href="signup.html" class="modify-btn" style="text-decoration: none;">📝 Nuovo studente</a>
</div>

    </div>
     
    <div class="students-section">
      <div class="students-header">
        <h3>🎓 Studenti</h3>
        <div class="toggle-container">
          <span class="toggle-label">I miei</span>
          <label class="toggle-switch">
            <input type="checkbox" id="viewAllToggle">
            <span class="slider"></span>
          </label>
          <span class="toggle-label">Tutti</span>
        </div>
      </div>
      <div id="studentsContainer">
        <div class="loading">Caricamento studenti</div>
      </div>
    </div>
  </div>
  
  <script>
    // Carica l'header dal file esterno
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });
  </script>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://elrwpaezjnemmiegkyin.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVscndwYWV6am5lbW1pZWdreWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgwNzAyMDUsImV4cCI6MjA1MzY0NjIwNX0.p6R2S1HK8kPFYiEAYtYaxIAH8XSmzjQBWQ_ywy3akdI";  

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentTutorId = null;
    let isInitialized = false;

    // Funzione per verificare se dobbiamo ricaricare
    function shouldReload() {
      const lastLoad = sessionStorage.getItem('dashboardLastLoad');
      const now = Date.now();
      // Se sono passati più di 2 secondi dall'ultimo caricamento
      return !lastLoad || (now - parseInt(lastLoad)) > 2000;
    }

    // Inizializza tutto dopo che il DOM è pronto
    async function initializeDashboard() {
      if (isInitialized && !shouldReload()) return;
      
      isInitialized = true;
      sessionStorage.setItem('dashboardLastLoad', Date.now());
      
      // Prima ottieni il tutor ID
      currentTutorId = await getTutorId();
      if (!currentTutorId) return;

      // Recupera lo stato salvato
      const savedViewAll = sessionStorage.getItem('tutorDashboardViewAll') === 'true';
      document.getElementById('viewAllToggle').checked = savedViewAll;
      
      // Carica i dati appropriati
      if (savedViewAll) {
        await fetchAllStudents();
      } else {
        await fetchMyStudents();
      }
    }

    // Toggle event listener
    document.getElementById('viewAllToggle').addEventListener('change', (e) => {
      // Salva lo stato nel sessionStorage
      sessionStorage.setItem('tutorDashboardViewAll', e.target.checked);
      sessionStorage.setItem('dashboardLastLoad', Date.now());
      
      if (e.target.checked) {
        fetchAllStudents();
      } else {
        fetchMyStudents();
      }
    });

    // Forza il reload quando la pagina diventa visibile
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && shouldReload()) {
        initializeDashboard();
      }
    });

    // Avvia l'inizializzazione
    // Metodo semplice: forza sempre il reload al caricamento della pagina
    window.addEventListener('load', async () => {
      // Prima ottieni il tutor ID
      currentTutorId = await getTutorId();
      if (!currentTutorId) return;

      // Recupera lo stato salvato del toggle
      const savedViewAll = sessionStorage.getItem('tutorDashboardViewAll') === 'true';
      
      // Imposta il toggle
      document.getElementById('viewAllToggle').checked = savedViewAll;
      
      // Carica SEMPRE i dati freschi
      if (savedViewAll) {
        await fetchAllStudents();
      } else {
        await fetchMyStudents();
      }
    });
    setTimeout(async () => {
      const { data: sessionData } = await supabase.auth.getSession();
      if (sessionData?.session) {
        const userId = sessionData.session.user.id;
        const { data: tutor } = await supabase
          .from("tutors")
          .select("name")
          .eq("auth_uid", userId)
          .single();
        
        if (tutor?.name) {
          const userNameElement = document.querySelector('.user-name');
          if (userNameElement) {
            userNameElement.textContent = tutor.name;
          }
        }
      }

      // Aggiungi evento logout
      document.getElementById('logoutBtn')?.addEventListener('click', async () => {
        await supabase.auth.signOut();
        window.location.href = "/";
      });
    }, 100);

    async function getTutorId() {
      const { data: userData, error: authError } = await supabase.auth.getUser();
      if (authError || !userData || !userData.user) {
          alert("Sessione scaduta. Accedi di nuovo.");
          window.location.href = "/";
          return null;
      }
      const authUid = userData.user.id;
      const { data: tutorData } = await supabase
          .from("tutors")
          .select("id")
          .eq("auth_uid", authUid)
          .single();
      return tutorData?.id;
    }

    async function fetchMyStudents() {
      if (!currentTutorId) {
        currentTutorId = await getTutorId();
        if (!currentTutorId) return;
      }
      
      const { data: students } = await supabase
          .from("students")
          .select("id, auth_uid, name, tests")
          .eq("tutor_id", currentTutorId);
      
      displayStudentProgress(students || [], false);
    }

    async function fetchAllStudents() {
      // Recupera tutti gli studenti con info del tutor
      const { data: students } = await supabase
          .from("students")
          .select(`
            id, 
            auth_uid, 
            name, 
            tests,
            tutor_id,
            tutors(name)
          `);
      
      displayStudentProgress(students || [], true);
    }

    async function displayStudentProgress(students, showAllMode) {
      const studentsContainer = document.getElementById("studentsContainer");
      studentsContainer.innerHTML = "";

      if (students.length === 0) {
        const message = showAllMode ?
          'Nessuno studente nel sistema' :
          'Nessuno studente assegnato a te';
        studentsContainer.innerHTML = `<p style="text-align: center; color: #6c757d;">${message}</p>`;
        return;
      }

      for (const student of students) {
        const studentDiv = document.createElement("div");
        studentDiv.classList.add("student-progress");

        // Student header with tutor badge if in "all" mode
        let studentHeader = `<h3>👤 ${student.name}`;
        if (showAllMode && student.tutors) {
          const isMyStudent = student.tutor_id === currentTutorId;
          const tutorName = isMyStudent ? 'Tu' : student.tutors.name;
          const badgeColor = isMyStudent ? '#00a666' : '#6c757d';
          studentHeader += ` <span class="tutor-badge" style="background: ${badgeColor}">Tutor: ${tutorName}</span>`;
        }
        studentHeader += '</h3>';
        studentDiv.innerHTML = studentHeader;

        if (student.tests && student.tests.length > 0) {
          // Sort tests: "Assessment Iniziale" first, then alphabetically
          const sortedTests = [...student.tests].sort((a, b) => {
            if (a.includes("Assessment Iniziale")) return -1;
            if (b.includes("Assessment Iniziale")) return 1;
            return a.localeCompare(b);
          });

          const testsGrid = document.createElement("div");
          testsGrid.classList.add("tests-grid");

          sortedTests.forEach(testOption => {
            const testCard = document.createElement("div");
            testCard.classList.add("test-card");

            const testHeader = document.createElement("div");
            testHeader.classList.add("test-card-header");
            testHeader.textContent = `📝 ${testOption}`;
            testCard.appendChild(testHeader);

            const buttonsDiv = document.createElement("div");
            buttonsDiv.classList.add("test-card-buttons");

            const viewTestsBtn = document.createElement("button");
            viewTestsBtn.classList.add("viewTestsBtn");
            viewTestsBtn.textContent = "Test assegnati";
            viewTestsBtn.onclick = () => viewStudentTests(student.auth_uid, student.name, testOption);
            buttonsDiv.appendChild(viewTestsBtn);

            const dashboardBtn = document.createElement("button");
            dashboardBtn.classList.add("dashboardBtn");
            dashboardBtn.textContent = "Risultati";
            dashboardBtn.onclick = () => viewStudentDashboard(student.auth_uid, student.name, testOption);
            buttonsDiv.appendChild(dashboardBtn);

            testCard.appendChild(buttonsDiv);
            testsGrid.appendChild(testCard);
          });

          studentDiv.appendChild(testsGrid);
        } else {
          studentDiv.innerHTML += '<p class="no-tests-message">Nessun test disponibile</p>';
        }
        studentsContainer.appendChild(studentDiv);
      }
    }

    // Toggle event listener
    document.getElementById('viewAllToggle').addEventListener('change', (e) => {
      if (e.target.checked) {
        fetchAllStudents();
      } else {
        fetchMyStudents();
      }
    });

    window.viewStudentTests = function (studentId, studentName, selectedTest) {
      sessionStorage.setItem("selectedStudentId", studentId);
      sessionStorage.setItem("selectedStudentName", studentName);
      sessionStorage.setItem("selectedTestType", selectedTest);

      // 🌐 AUTOMATIC LANGUAGE SWITCH FOR SAT AND GMAT TESTS
      // SAT and GMAT test views must always be in English
      if (selectedTest === "SAT PDF" || selectedTest === "GMAT") {
        console.log(`🌍 ${selectedTest} selected - switching to English version automatically`);
        window.location.href = "../inglese/view_tests.html";
        return;
      }

      window.location.href = "view_tests.html";
    };

    window.viewStudentDashboard = function (studentId, studentName, selectedTest) {
      sessionStorage.setItem("selectedStudentId", studentId);
      sessionStorage.setItem("selectedStudentName", studentName);
      sessionStorage.setItem("selectedTestType", selectedTest);
      window.location.href = "dashboard.html";
    };

    document.getElementById("modifyTestsBtn").addEventListener("click", () => {
      window.location.href = "modify_tests.html";
    });

    document.getElementById("assignTestsBtn").addEventListener("click", () => {
      window.location.href = "assign_tests.html";
    });

    // Carica inizialmente i propri studenti
    fetchMyStudents();
  </script>
  <!-- Animated Background (se hai il file) -->
  <script src="animated-background.js"></script>
</body>
</html>
