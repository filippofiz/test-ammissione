<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reindirizzamento... - Up to Ten</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      color: rgb(28, 37, 69);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .redirect-container {
      text-align: center;
      background: white;
      padding: 3rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      max-width: 500px;
    }

    .logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 {
      color: rgb(28, 37, 69);
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    p {
      color: #6c757d;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e9ecef;
      border-top-color: #00a666;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="redirect-container">
    <div class="logo">🎯</div>
    <h1>Reindirizzamento alla nuova piattaforma...</h1>
    <p>Sarai reindirizzato automaticamente alla nuova versione della piattaforma Up to Ten.</p>
    <div class="spinner"></div>
    <p style="margin-top: 2rem;">
      <a href="https://portale-test.up2ten.it" style="color: #00a666; text-decoration: none; font-weight: 600;">
        Se non vieni reindirizzato automaticamente, clicca qui
      </a>
    </p>
  </div>

  <script>
    // Set language preference
    localStorage.setItem('language', 'it');

    // Immediate redirect
    window.location.replace('https://portale-test.up2ten.it');
  </script>
</body>
</html>
