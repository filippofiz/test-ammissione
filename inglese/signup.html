<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration | Up to Ten</title>
  <link rel="stylesheet" href="header.css" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      color: rgb(28, 37, 69);
      position: relative;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.6;
    }

    .container {
      max-width: 600px;
      margin: 4rem auto;
      padding: 2rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.16);
      position: relative;
      z-index: 1;
    }

    h2 {
      text-align: center;
      margin-bottom: 2rem;
    }

    input, select, button {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
      line-height: 1.2;
      box-sizing: border-box;
      appearance: none;
      -webkit-appearance: none;
    }

    select[multiple] {
      height: auto;
    }

    button {
      background: rgb(28, 37, 69);
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    button:hover {
      background: #00a666;
    }

    .refresh-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: rgb(28, 37, 69);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .refresh-btn:hover {
      background: #00a666;
      color: white;
      border-color: #00a666;
    }

    .form-footer {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.95rem;
    }

    .form-footer a {
      color: rgb(28, 37, 69);
      font-weight: bold;
      text-decoration: none;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .password-info {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 1rem;
    }

    .error-message {
      color: #d32f2f;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background-color: #ffebee;
      border-radius: 4px;
      display: none;
    }

    .success-message {
      color: #388e3c;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background-color: #e8f5e9;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Optional background -->
  <script src="animated-background.js"></script>

  <div class="container">
    <h2>Student Registration</h2>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" placeholder="John Smith" />

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="name@email.com" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" />
    
    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm password" />
    <p class="password-info">Password must be at least 6 characters long</p>

    <label for="tutorDropdown">Select tutor</label>
    <select id="tutorDropdown">
      <option value="">-- Choose a tutor --</option>
    </select>

    <label for="testsDropdown">Select tests (you can choose more than one):</label>
    <select id="testsDropdown" multiple size="4"></select>

    <button id="refreshTutors" class="refresh-btn">🔄 Refresh tutors</button>
    <button id="signupBtn">Register Student</button>

    <div class="form-footer">
      <p>The student will be able to log in with email and password</p>
    </div>
  </div>
