<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Registration | Up to Ten</title>
  <link rel="stylesheet" href="header.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      color: rgb(28, 37, 69);
      position: relative;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.6;
    }

    .container {
      max-width: 600px;
      margin: 7rem auto 4rem;
      padding: 2rem;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.16);
      position: relative;
      z-index: 1;
    }

    h2 {
      text-align: center;
      margin-bottom: 2rem;
    }

    input, select, button {
      width: 100%;
      padding: 0.75rem;
      margin-bottom: 1rem;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
      line-height: 1.2;
      box-sizing: border-box;
      appearance: none;
      -webkit-appearance: none;
    }

    select[multiple] {
      height: auto;
    }

    button {
      background: rgb(28, 37, 69);
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    button:hover {
      background: #00a666;
    }

    .refresh-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: rgb(28, 37, 69);
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }

    .refresh-btn:hover {
      background: #00a666;
      color: white;
      border-color: #00a666;
    }

    .form-footer {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.95rem;
    }

    .form-footer a {
      color: rgb(28, 37, 69);
      font-weight: bold;
      text-decoration: none;
    }

    .form-footer a:hover {
      text-decoration: underline;
    }

    label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .password-info {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 1rem;
    }

    .error-message {
      color: #d32f2f;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background-color: #ffebee;
      border-radius: 4px;
      display: none;
    }

    .success-message {
      color: #388e3c;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      padding: 0.5rem;
      background-color: #e8f5e9;
      border-radius: 4px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header-placeholder"></div>

  <!-- Optional background -->
  <script src="animated-background.js"></script>

  <div class="container">
    <h2>Student Registration</h2>
    <div id="authStatus" style="background: #f0f8ff; padding: 10px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #0066cc;">
      Checking authentication status...
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" placeholder="John Smith" />

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="name@email.com" />

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" />
    
    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm password" />
    <p class="password-info">Password must be at least 6 characters long</p>

    <label for="tutorDropdown">Select tutor</label>
    <select id="tutorDropdown">
      <option value="">-- Choose a tutor --</option>
    </select>

    <label for="testsDropdown">Select tests (you can choose more than one):</label>
    <select id="testsDropdown" multiple size="4"></select>

    <button id="refreshTutors" class="refresh-btn">🔄 Refresh tutors</button>
    <button id="signupBtn">Register Student</button>

    <div class="form-footer">
      <p>The student will be able to log in with email and password</p>
    </div>
  </div>

  <!-- Supabase -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const SUPABASE_URL = "https://elrwpaezjnemmiegkyin.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVscndwYWV6am5lbW1pZWdreWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgwNzAyMDUsImV4cCI6MjA1MzY0NjIwNX0.p6R2S1HK8kPFYiEAYtYaxIAH8XSmzjQBWQ_ywy3akdI";  
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    window.supabase = supabase;
  </script>

  <script type="module" src="signup.js?v=4"></script>

  <!-- Display Auth Status -->
  <script>
    async function displayAuthStatus() {
      const authDiv = document.getElementById('authStatus');
      if (!authDiv) return;

      const { data: session } = await window.supabase.auth.getSession();

      if (session?.session) {
        const user = session.session.user;

        // Check if user is a tutor
        const { data: tutorData } = await window.supabase
          .from('tutors')
          .select('id, name')
          .eq('auth_uid', user.id)
          .single();

        if (tutorData) {
          authDiv.innerHTML = `
            <strong>✅ Logged in as TUTOR:</strong><br>
            Name: ${tutorData.name}<br>
            Email: ${user.email}<br>
            User ID: ${user.id}<br>
            Tutor ID: ${tutorData.id}
          `;
          authDiv.style.background = '#d4f8d4';
          authDiv.style.borderColor = '#00a666';
        } else {
          authDiv.innerHTML = `
            <strong>⚠️ Logged in but NOT A TUTOR:</strong><br>
            Email: ${user.email}<br>
            User ID: ${user.id}<br>
            <span style="color: red;">This user is not registered as a tutor!</span>
          `;
          authDiv.style.background = '#fff3cd';
          authDiv.style.borderColor = '#ffc107';
        }
      } else {
        authDiv.innerHTML = `
          <strong>❌ NOT LOGGED IN</strong><br>
          <span style="color: red;">No user is currently authenticated. You must be logged in as a tutor to register students.</span>
        `;
        authDiv.style.background = '#f8d7da';
        authDiv.style.borderColor = '#dc3545';
      }
    }

    // Check auth status when page loads and supabase is ready
    setTimeout(displayAuthStatus, 500);
  </script>

  <!-- Load header -->
  <script>
    // Load the header
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
        
        // Initialize header after loading
        setTimeout(async () => {
          const { data: sessionData } = await supabase.auth.getSession();
          if (sessionData?.session) {
            const userId = sessionData.session.user.id;
            const { data: tutor } = await supabase
              .from("tutors")
              .select("name")
              .eq("auth_uid", userId)
              .single();
            
            if (tutor?.name) {
              const userNameElement = document.querySelector('.user-name');
              if (userNameElement) {
                userNameElement.textContent = tutor.name;
              }
            }
          }

          // Add logout event
          document.getElementById('logoutBtn')?.addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = "/";
          });
        }, 100);
      });
  </script>
</body>
</html>
