// Handle logout with Supabase
document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
  e.preventDefault(); // Prevent default behavior
  console.log('Logout clicked');
  
  // Execute logout from Supabase
  const { error } = await supabase.auth.signOut();
  
  if (error) {
    console.error('Error during logout:', error);
  } else {
    // Clear all saved data
    sessionStorage.clear();
    localStorage.clear();
    
    // Force redirect to current domain root
    const currentHost = window.location.host;
    const protocol = window.location.protocol;
    console.log('Redirecting to:', protocol + '//' + currentHost + '/');
    
    // Use replace instead of href to avoid staying in history
    window.location.replace(protocol + '//' + currentHost + '/');
  }
});
</script>
