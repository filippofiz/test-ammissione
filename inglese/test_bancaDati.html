<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Test - Up to Ten</title>
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="test_bancaDati.css">
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
        ignoreHtmlClass: 'tex2jax_ignore|mathjax_ignore|di-ds-student-container|di-gi-student-container|di-ta-student-container|di-tpa-student-container|di-msr-student-container',
        processHtmlClass: 'tex2jax_process'
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Container principale per fullscreen -->
  <div id="testContainer">
    <!-- Header placeholder - nascosto in fullscreen -->
    <div id="header-placeholder"></div>

    <div class="test-container">
      <!-- Area principale domande (più grande senza PDF) -->
      <div class="question-section">
        <div id="timer" style="visibility: hidden;">
          ⏳ Time: <span id="time-left">--:--</span>
        </div>

        <div class="navigation" style="display: none;">
          <button id="prevPage">Previous</button>
          <button id="nextPage">Next</button>
        </div>

        <div id="question-container">
          <!-- Contenuto generato dinamicamente da JS -->
        </div>
      </div>

      <!-- Navigazione quiz laterale -->
      <div class="nav-container">
        <h3>📍 Quiz navigation</h3>
        <div id="questionNav"></div>
        <button id="submitAnswers" class="submit-btn" style="display: none;">
          📤 Submit Test
        </button>
      </div>
    </div>
  </div>

  <script>
    // Carica l'header dal file esterno
    fetch('header.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('header-placeholder').innerHTML = data;
      });
  </script>

  <!-- Supabase -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
    const SUPABASE_URL = "https://elrwpaezjnemmiegkyin.supabase.co"; 
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVscndwYWV6am5lbW1pZWdreWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgwNzAyMDUsImV4cCI6MjA1MzY0NjIwNX0.p6R2S1HK8kPFYiEAYtYaxIAH8XSmzjQBWQ_ywy3akdI";
    window.supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Setup header dopo il caricamento
    setTimeout(async () => {
      if (!document.fullscreenElement) {
        const { data: sessionData } = await supabase.auth.getSession();
        if (sessionData?.session) {
          const userId = sessionData.session.user.id;
          const { data: student } = await supabase
            .from("students")
            .select("name")
            .eq("auth_uid", userId)
            .single();
          
          if (student?.name) {
            const userNameElement = document.querySelector('.user-name');
            if (userNameElement) {
              userNameElement.textContent = student.name;
            }
          }
        }

        // Event listener logout
        document.getElementById('logoutBtn')?.addEventListener('click', async () => {
          await supabase.auth.signOut();
          window.location.href = "login.html";
        });
      }
    }, 100);
  </script>

  <!-- GMAT Data Insights Student Renderers -->
  <script src="gmat/data-insights/di-student-data-sufficiency.js"></script>
  <script src="gmat/data-insights/di-student-graphics-interpretation.js"></script>
  <script src="gmat/data-insights/di-student-table-analysis.js"></script>
  <script src="gmat/data-insights/di-student-two-part-analysis.js"></script>
  <script src="gmat/data-insights/di-student-multi-source-reasoning.js"></script>

  <script type="module" src="test_bancaDati.js"></script>
</body>
</html>
