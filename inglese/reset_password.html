<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password | Up to Ten</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2 id="pageTitle">Set Your Password</h2>
        <p id="pageMessage" style="margin-bottom: 1.5rem; color: #666;"></p>
        
        <input type="password" id="newPassword" placeholder="Enter password">
        <input type="password" id="confirmPassword" placeholder="Confirm password">
        <button id="resetBtn">Confirm</button>
        <p id="errorMessage" style="color: red;"></p>
    </div>

    <!-- Include Supabase via CDN -->
    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

        const SUPABASE_URL = "https://elrwpaezjnemmiegkyin.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVscndwYWV6am5lbW1pZWdreWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgwNzAyMDUsImV4cCI6MjA1MzY0NjIwNX0.p6R2S1HK8kPFYiEAYtYaxIAH8XSmzjQBWQ_ywy3akdI";  

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Global variable to track the operation type
        let operationType = 'recovery'; // default
        
        // Check if there's a token in the URL
        async function checkForToken() {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const queryParams = new URLSearchParams(window.location.search);
            
            const access_token = hashParams.get('access_token');
            const type = hashParams.get('type') || queryParams.get('type');
            const error = hashParams.get('error');
            const error_description = hashParams.get('error_description');
            
            // Save the operation type
            if (type) {
                operationType = type;
            }
            
            // If there's an error in the URL
            if (error) {
                console.error("Error in URL:", error, error_description);
                document.getElementById("errorMessage").textContent = "Invalid or expired link. Request a new invitation.";
                return;
            }
            
            // Customize the page based on the type
            const titleElement = document.getElementById("pageTitle");
            const messageElement = document.getElementById("pageMessage");
            
            if (operationType === 'signup' || operationType === 'invite') {
                titleElement.textContent = "Welcome to Up to Ten!";
                messageElement.textContent = "Your tutor has created an account for you. Choose a secure password to get started.";
            } else if (operationType === 'recovery') {
                titleElement.textContent = "Reset Password";
                messageElement.textContent = "Enter your new password.";
            }
            
            if (access_token) {
                console.log("Token found, type:", operationType);
            } else {
                console.error("No access token found in URL");
                document.getElementById("errorMessage").textContent = "Invalid link. Request a new link.";
            }
        }

        // Run token check when page loads
        checkForToken();

        document.getElementById("resetBtn").addEventListener("click", async () => {
            const newPassword = document.getElementById("newPassword").value.trim();
            const confirmPassword = document.getElementById("confirmPassword").value.trim();
            const errorMsg = document.getElementById("errorMessage");
            
            errorMsg.textContent = "";
            
            // Validations
            if (!newPassword || !confirmPassword) {
                errorMsg.textContent = "Fill in both fields.";
                return;
            }
            
            if (newPassword !== confirmPassword) {
                errorMsg.textContent = "Passwords do not match.";
                return;
            }
            
            if (newPassword.length < 6) {
                errorMsg.textContent = "Password must be at least 6 characters.";
                return;
            }

            try {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const access_token = hashParams.get('access_token');
                const refresh_token = hashParams.get('refresh_token');
                
                if (!access_token) {
                    errorMsg.textContent = "Missing token. Request a new link.";
                    return;
                }
                
                console.log("Attempting to set password, operation type:", operationType);
                
                // For new users (signup/invite), we must first verify the email
                if (operationType === 'signup' || operationType === 'invite') {
                    console.log("Signup/invite process");
                    
                    // First verify the token and get user data
                    const { data: verifyData, error: verifyError } = await supabase.auth.verifyOtp({
                        type: 'signup',
                        token: access_token
                    });
                    
                    if (verifyError) {
                        console.error("OTP verification error:", verifyError);
                        
                        // If OTP verification fails, try setting the session directly
                        const { data: sessionData, error: sessionError } = await supabase.auth.setSession({
                            access_token: access_token,
                            refresh_token: refresh_token
                        });
                        
                        if (sessionError) {
                            console.error("Session setting error:", sessionError);
                            errorMsg.textContent = "Authentication error. Request a new invitation.";
                            return;
                        }
                    }
                    
                    // Now update the password
                    const { data: updateData, error: updateError } = await supabase.auth.updateUser({
                        password: newPassword
                    });
                    
                    if (updateError) {
                        console.error("Password update error:", updateError);
                        errorMsg.textContent = "Error setting password: " + updateError.message;
                        return;
                    }
                    
                    console.log("Password set successfully for new user");
                    
                } else {
                    // For recovery (existing users)
                    console.log("Password recovery process");
                    
                    // Set session with token
                    const { data: sessionData, error: sessionError } = await supabase.auth.setSession({
                        access_token: access_token,
                        refresh_token: refresh_token
                    });
                    
                    if (sessionError) {
                        console.error("Session setting error:", sessionError);
                        errorMsg.textContent = "Session expired. Request a new reset link.";
                        return;
                    }
                    
                    // Update the password
                    const { data: updateData, error: updateError } = await supabase.auth.updateUser({
                        password: newPassword
                    });
                    
                    if (updateError) {
                        console.error("Password update error:", updateError);
                        errorMsg.textContent = "Error: " + updateError.message;
                        return;
                    }
                    
                    console.log("Password reset successfully");
                }
                
                // Update password_set in students table if necessary
                const { data: { user } } = await supabase.auth.getUser();
                
                if (user) {
                    // Check if user exists in students table
                    const { data: studentExists } = await supabase
                        .from("students")
                        .select("auth_uid")
                        .eq("auth_uid", user.id)
                        .single();
                    
                    if (studentExists) {
                        await supabase
                            .from("students")
                            .update({ password_set: true })
                            .eq("auth_uid", user.id);
                        console.log("password_set flag updated");
                    }
                }
                
                // Logout
                await supabase.auth.signOut();
                
                // Success message
                if (operationType === 'signup' || operationType === 'invite') {
                    alert("✅ Account activated successfully!\n\nYou can now log in with your email and password.");
                } else {
                    alert("✅ Password reset successfully!");
                }
                
                // Redirect to login
                window.location.href = "login.html";
                
            } catch (err) {
                console.error("Unexpected error:", err);
                errorMsg.textContent = "An unexpected error occurred. Please try again.";
            }
        });
    </script>
</body>
</html>
