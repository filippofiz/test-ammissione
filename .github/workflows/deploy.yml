name: Deploy to GitHub Pages

on:
  push:
    branches:
      - NewCodeTypescript

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: |
          cd admission-platform-v2
          pnpm install

      - name: Build React app
        run: |
          cd admission-platform-v2/apps/web
          npx vite build

      - name: Prepare deployment folder
        run: |
          mkdir -p deploy
          # Copy entire repo content (excluding node_modules and git)
          rsync -av --exclude='node_modules' --exclude='.git' --exclude='deploy' --exclude='admission-platform-v2/dist' . deploy/
          # Copy built React app to deploy folder
          cp -r admission-platform-v2/dist/* deploy/admission-platform-v2/dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
