<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imposta Password | Up to Ten</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h2 id="pageTitle">Imposta la tua Password</h2>
        <p id="pageMessage" style="margin-bottom: 1.5rem; color: #666;"></p>
        
        <input type="password" id="newPassword" placeholder="Inserisci la password">
        <input type="password" id="confirmPassword" placeholder="Conferma password">
        <button id="resetBtn">Conferma</button>
        <p id="errorMessage" style="color: red;"></p>
    </div>

    <!-- Include Supabase via CDN -->
    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

        const SUPABASE_URL = "https://elrwpaezjnemmiegkyin.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVscndwYWV6am5lbW1pZWdreWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzgwNzAyMDUsImV4cCI6MjA1MzY0NjIwNX0.p6R2S1HK8kPFYiEAYtYaxIAH8XSmzjQBWQ_ywy3akdI";  

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Variabile globale per tenere traccia del tipo di operazione
        let operationType = 'recovery'; // default
        
        // Controlla se c'è un token nell'URL
        async function checkForToken() {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const queryParams = new URLSearchParams(window.location.search);
            
            const access_token = hashParams.get('access_token');
            const type = hashParams.get('type') || queryParams.get('type');
            const error = hashParams.get('error');
            const error_description = hashParams.get('error_description');
            
            // Salva il tipo di operazione
            if (type) {
                operationType = type;
            }
            
            // Se c'è un errore nell'URL
            if (error) {
                console.error("Errore nell'URL:", error, error_description);
                document.getElementById("errorMessage").textContent = "Link non valido o scaduto. Richiedi un nuovo invito.";
                return;
            }
            
            // Personalizza la pagina in base al tipo
            const titleElement = document.getElementById("pageTitle");
            const messageElement = document.getElementById("pageMessage");
            
            if (operationType === 'signup' || operationType === 'invite') {
                titleElement.textContent = "Benvenuto in Up to Ten!";
                messageElement.textContent = "Il tuo tutor ti ha creato un account. Scegli una password sicura per iniziare.";
            } else if (operationType === 'recovery') {
                titleElement.textContent = "Reset Password";
                messageElement.textContent = "Inserisci la tua nuova password.";
            }
            
            if (access_token) {
                console.log("Token trovato, tipo:", operationType);
            } else {
                console.error("Nessun token di accesso trovato nell'URL");
                document.getElementById("errorMessage").textContent = "Link non valido. Richiedi un nuovo link.";
            }
        }

        // Esegui il controllo del token quando la pagina si carica
        checkForToken();

        document.getElementById("resetBtn").addEventListener("click", async () => {
            const newPassword = document.getElementById("newPassword").value.trim();
            const confirmPassword = document.getElementById("confirmPassword").value.trim();
            const errorMsg = document.getElementById("errorMessage");
            
            errorMsg.textContent = "";
            
            // Validazioni
            if (!newPassword || !confirmPassword) {
                errorMsg.textContent = "Compila entrambi i campi.";
                return;
            }
            
            if (newPassword !== confirmPassword) {
                errorMsg.textContent = "Le password non coincidono.";
                return;
            }
            
            if (newPassword.length < 6) {
                errorMsg.textContent = "La password deve essere di almeno 6 caratteri.";
                return;
            }

            try {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const access_token = hashParams.get('access_token');
                const refresh_token = hashParams.get('refresh_token');
                
                if (!access_token) {
                    errorMsg.textContent = "Token mancante. Richiedi un nuovo link.";
                    return;
                }
                
                console.log("Tentativo di impostare la password, tipo operazione:", operationType);
                
                // Per i nuovi utenti (signup/invite), dobbiamo prima verificare l'email
                if (operationType === 'signup' || operationType === 'invite') {
                    console.log("Processo di signup/invite");
                    
                    // Prima verifica il token e ottieni i dati dell'utente
                    const { data: verifyData, error: verifyError } = await supabase.auth.verifyOtp({
                        type: 'signup',
                        token: access_token
                    });
                    
                    if (verifyError) {
                        console.error("Errore verifica OTP:", verifyError);
                        
                        // Se la verifica OTP fallisce, proviamo a impostare direttamente la sessione
                        const { data: sessionData, error: sessionError } = await supabase.auth.setSession({
                            access_token: access_token,
                            refresh_token: refresh_token
                        });
                        
                        if (sessionError) {
                            console.error("Errore impostazione sessione:", sessionError);
                            errorMsg.textContent = "Errore di autenticazione. Richiedi un nuovo invito.";
                            return;
                        }
                    }
                    
                    // Ora aggiorna la password
                    const { data: updateData, error: updateError } = await supabase.auth.updateUser({
                        password: newPassword
                    });
                    
                    if (updateError) {
                        console.error("Errore aggiornamento password:", updateError);
                        errorMsg.textContent = "Errore nell'impostazione della password: " + updateError.message;
                        return;
                    }
                    
                    console.log("Password impostata con successo per nuovo utente");
                    
                } else {
                    // Per recovery (utenti esistenti)
                    console.log("Processo di recovery password");
                    
                    // Imposta la sessione con il token
                    const { data: sessionData, error: sessionError } = await supabase.auth.setSession({
                        access_token: access_token,
                        refresh_token: refresh_token
                    });
                    
                    if (sessionError) {
                        console.error("Errore impostazione sessione:", sessionError);
                        errorMsg.textContent = "Sessione scaduta. Richiedi un nuovo link di reset.";
                        return;
                    }
                    
                    // Aggiorna la password
                    const { data: updateData, error: updateError } = await supabase.auth.updateUser({
                        password: newPassword
                    });
                    
                    if (updateError) {
                        console.error("Errore aggiornamento password:", updateError);
                        errorMsg.textContent = "Errore: " + updateError.message;
                        return;
                    }
                    
                    console.log("Password reimpostata con successo");
                }
                
                // Aggiorna password_set nella tabella students se necessario
                const { data: { user } } = await supabase.auth.getUser();
                
                if (user) {
                    // Verifica se l'utente esiste nella tabella students
                    const { data: studentExists } = await supabase
                        .from("students")
                        .select("auth_uid")
                        .eq("auth_uid", user.id)
                        .single();
                    
                    if (studentExists) {
                        await supabase
                            .from("students")
                            .update({ password_set: true })
                            .eq("auth_uid", user.id);
                        console.log("Flag password_set aggiornato");
                    }
                }
                
                // Logout
                await supabase.auth.signOut();
                
                // Messaggio di successo
                if (operationType === 'signup' || operationType === 'invite') {
                    alert("✅ Account attivato con successo!\n\nOra puoi accedere con la tua email e password.");
                } else {
                    alert("✅ Password reimpostata con successo!");
                }
                
                // Redirect al login
                window.location.href = "login.html";
                
            } catch (err) {
                console.error("Errore imprevisto:", err);
                errorMsg.textContent = "Si è verificato un errore imprevisto. Riprova.";
            }
        });
    </script>
</body>
</html>
