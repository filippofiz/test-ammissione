<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Up to Ten - Redirecting...</title>
  <meta http-equiv="refresh" content="0; url=italiano/index.html">
  <script>
    // Redirect immediato basato sulla lingua del browser
    const userLang = navigator.language || navigator.userLanguage;
    if (userLang.startsWith('en')) {
      window.location.href = 'inglese/index.html';
    } else {
      window.location.href = 'italiano/index.html';
    }
  </script>
</head>
<body>
  <p>Redirecting / Reindirizzamento...</p>
</body>
</html>
